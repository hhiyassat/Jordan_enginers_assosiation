; Elevated limits for the ESP v2 dev server so drawing uploads (DWG, PDF)
; up to ~50MB reach Laravel instead of getting rejected at the PHP layer
; with HTTP 413. Match the schema's max_size_mb ceiling with a small
; buffer for multipart form overhead.
;
; Start the server with:  php -c backend/php-dev.ini artisan serve --port=8002
; Or use the wrapper:     backend/serve.sh

upload_max_filesize = 60M
post_max_size       = 65M
memory_limit        = 256M
max_execution_time  = 300
max_input_time      = 300
