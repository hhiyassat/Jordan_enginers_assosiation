<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      JORD-31 / JORD-82 / JORD-83: Content-Security-Policy.

      This meta tag is the "braces" — a defense-in-depth policy the
      browser applies even if the reverse proxy is misconfigured. The
      "belt" (production CSP delivered via the HTTP Content-Security-
      Policy header from nginx) is the authoritative source. See
      docs/deployment_csp.md for the header nginx must set — in
      particular `frame-ancestors 'none'`, which browsers deliberately
      IGNORE when delivered via <meta> (per CSP Level 2 §2.4), so the
      only way to actually clickjack-protect the SPA is via the HTTP
      header. `frame-ancestors` is therefore intentionally OMITTED
      from this meta tag — X-Frame-Options DENY (set by the API and
      by nginx) keeps the frame guard alive locally.

      Rules picked to fit the current stack:
        • default-src 'self'          — everything defaults to same-origin
        • script-src 'self'           — no external scripts loaded
        • style-src   'self' 'unsafe-inline' https://fonts.googleapis.com
                                      — Vite emits inline <style> blocks;
                                        Tailwind's runtime also needs
                                        inline styles. JORD-82: Google
                                        Fonts stylesheet whitelist for
                                        the Cairo family loaded from
                                        src/index.css.
        • img-src   'self' data: blob:  — QR codes render from data URLs;
                                        blob covers document previews.
        • font-src  'self' data: https://fonts.gstatic.com
                                      — inline base64 fonts sneak in via
                                        lucide-react + Tailwind resets;
                                        JORD-82: Cairo font files come
                                        from fonts.gstatic.com.
        • connect-src 'self'          — API + same-origin XHR only.
        • base-uri 'self'; form-action 'self'
                                      — HTML injection defense.
        • object-src 'none'           — no Flash / plugins.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: blob:;
      font-src 'self' data: https://fonts.gstatic.com;
      connect-src 'self';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
    ">

    <!-- JORD-85: SVG favicon (browsers fall back to /favicon.ico
         automatically, so no ICO file needed on modern targets). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>منصة الخدمات الإلكترونية — Eqratech</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
